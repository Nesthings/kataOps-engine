name: CI/CD Pipeline - KataOps Engine

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:

  test:
    name: Code Validation & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run Pytest Automation
        env:
          # Usamos una DB en memoria para evitar llamadas a AWS RDS durante los tests
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          PYTHONPATH=. pytest


  build-and-push:
    name: Docker Build & Amazon ECR Registry
    runs-on: ubuntu-latest
    needs: [test] # Bloqueo de seguridad: Si los tests fallan, no hay build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4  
        with:
          role-to-assume: arn:aws:iam::404167069240:role/GitHubAction-AWS-Connector
          aws-region: us-east-1

          # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Multistage Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }} 
          ECR_REPOSITORY: kataops-engine
          IMAGE_TAG: v1
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG . 
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


  deploy:
    name: Amazon ECS Cluster Orchestration
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4  
        with:
          role-to-assume: arn:aws:iam::404167069240:role/GitHubAction-AWS-Connector
          aws-region: us-east-1

      - name: Update ECS Service (Force New Deployment)
        run: |
          aws ecs update-service --cluster kataops-cluster --service kataops-service --force-new-deployment